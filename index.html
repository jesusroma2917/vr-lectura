<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Salón VR — Lecto-Escritura</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
canvas{position:fixed;top:0;left:0;}
#hud{position:fixed;inset:0;pointer-events:none;z-index:30;}
#instruccion{position:absolute;top:14px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.85);border:2px solid #FFD700;color:#fff;
  font:bold 1.05rem Arial,sans-serif;padding:10px 24px;border-radius:12px;
  text-align:center;max-width:90vw;white-space:nowrap;}
#topright{position:absolute;top:14px;right:14px;display:flex;gap:8px;
  align-items:center;pointer-events:all;}
#progreso{background:rgba(0,0,0,.85);border:2px solid #4CAF50;color:#fff;
  font:bold .9rem Arial,sans-serif;padding:7px 13px;border-radius:10px;}
#btnR{background:rgba(0,0,0,.85);border:2px solid #FF6B35;color:#FF6B35;
  font:bold .8rem Arial,sans-serif;padding:7px 13px;border-radius:10px;cursor:pointer;}
#gaze{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:58px;height:58px;pointer-events:none;}
#feedback{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font:900 2rem Arial,sans-serif;padding:18px 36px;border-radius:18px;
  text-align:center;opacity:0;transition:opacity .3s;pointer-events:none;
  text-shadow:0 2px 6px #000;}
#feedback.show{opacity:1;}
#feedback.ok{background:rgba(0,160,0,.93);color:#fff;border:3px solid #0f0;}
#feedback.mal{background:rgba(190,0,0,.93);color:#fff;border:3px solid #f00;}
#btnVR{position:absolute;bottom:18px;right:16px;pointer-events:all;
  background:rgba(0,0,0,.85);border:2px solid #FFD700;color:#FFD700;
  font:bold .85rem Arial,sans-serif;padding:11px 20px;border-radius:10px;cursor:pointer;}
#inicio{position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 35%,#1a4a8a,#0a1a3a);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;transition:opacity .5s;}
#inicio.out{opacity:0;pointer-events:none;}
.it{font:900 2.1rem Arial,sans-serif;color:#FFD700;text-align:center;margin-bottom:.4em;
  text-shadow:0 0 30px #FFD70066;}
.is{font:.95rem Arial,sans-serif;color:#ffffffbb;margin-bottom:1.4rem;
  text-align:center;max-width:310px;line-height:1.5;}
.il{font:.88rem Arial,sans-serif;color:#fff;line-height:2.2;
  background:rgba(255,255,255,.09);padding:14px 22px;border-radius:12px;
  max-width:310px;margin-bottom:1.5rem;}
.ib{background:#FFD700;color:#1a1a1a;font:900 1.1rem Arial,sans-serif;
  padding:14px 48px;border:none;border-radius:14px;cursor:pointer;
  box-shadow:0 4px 20px #FFD70055;}
</style>
</head>
<body>
<div id="inicio">
  <div class="it">🏫 Salón VR<br>Lecto-Escritura</div>
  <div class="is">Forma oraciones con las tarjetas del pizarrón</div>
  <div class="il">
    🥽 Pon las <b>gafas Cardboard</b><br>
    👁️ <b>Mira</b> una tarjeta 1.5 seg → la tomas<br>
    🔄 <b>Gira la cabeza</b> al número del slot<br>
    ⏱️ <b>Quieto</b> 1.5 seg → la colocas<br>
    ✅ ¡Forma la oración correcta!
  </div>
  <button class="ib" onclick="start()">¡Comenzar! 🚀</button>
</div>
<canvas id="c"></canvas>
<div id="hud">
  <div id="instruccion">Mira una tarjeta 1.5 seg 👁️</div>
  <div id="topright">
    <button id="btnR" onclick="reiniciar()">🔄 Reiniciar</button>
    <div id="progreso">1 / 20</div>
  </div>
  <svg id="gaze" viewBox="0 0 58 58" fill="none">
    <circle cx="29" cy="29" r="22" stroke="rgba(255,255,255,.25)" stroke-width="3.5"/>
    <circle id="gazeArc" cx="29" cy="29" r="22"
      stroke="#FFD700" stroke-width="3.5" stroke-linecap="round" fill="none"
      stroke-dasharray="138.2" stroke-dashoffset="138.2"
      transform="rotate(-90 29 29)"/>
    <circle cx="29" cy="29" r="4.5" fill="#FFD700"/>
  </svg>
  <div id="feedback"></div>
  <button id="btnVR" onclick="toggleVR()">⬛ Modo Cardboard VR</button>
</div>
 
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ════════════════════════════════════════
// SONIDOS — Web Audio API (sin archivos externos)
// ════════════════════════════════════════
const AC = new (window.AudioContext || window.webkitAudioContext)();
 
function playTone(freq, type, dur, vol, delay=0) {
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0, AC.currentTime + delay);
  g.gain.linearRampToValueAtTime(vol, AC.currentTime + delay + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + delay + dur);
  o.start(AC.currentTime + delay);
  o.stop(AC.currentTime + delay + dur + 0.05);
}
 
function soundCorrecto() {
  // Melodía alegre ascendente
  [[523,0],[659,0.15],[784,0.30],[1047,0.45]].forEach(([f,d])=>
    playTone(f,'sine',0.3,0.18,d));
}
function soundIncorrecto() {
  // Dos notas descendentes
  playTone(330,'square',0.2,0.15,0);
  playTone(220,'square',0.3,0.12,0.22);
}
function soundTomar() {
  playTone(880,'sine',0.12,0.12);
}
function soundColocar() {
  playTone(660,'sine',0.15,0.1);
}
 
// Música de fondo — loop suave
function startBgMusic() {
  const notes = [261,293,329,349,392,440,493,523];
  let i = 0;
  function playNext() {
    if(!running) return;
    playTone(notes[i % notes.length], 'sine', 0.6, 0.04);
    i++;
    setTimeout(playNext, 700 + Math.random() * 400);
  }
  setTimeout(playNext, 1000);
}
 
// Desbloquear AudioContext en móvil (requiere interacción)
function unlockAudio() {
  if(AC.state === 'suspended') AC.resume();
}
document.addEventListener('touchstart', unlockAudio, {once:true});
document.addEventListener('click', unlockAudio, {once:true});
 
// ════════════════════════════════════════
// ORACIONES
// ════════════════════════════════════════
const ORACIONES=[
  ["El","gato","toma","leche"],
  ["La","niña","lee","un","libro"],
  ["Mi","mamá","hace","el","pan"],
  ["El","perro","corre","en","el","parque"],
  ["Los","niños","juegan","con","la","pelota"],
  ["La","maestra","escribe","en","el","pizarrón"],
  ["El","sol","brilla","en","el","cielo"],
  ["Mi","papá","maneja","el","carro"],
  ["La","vaca","come","pasto","verde"],
  ["El","pájaro","canta","en","el","árbol"],
  ["Los","patos","nadan","en","el","lago"],
  ["Mi","hermana","pinta","un","dibujo"],
  ["El","niño","toma","su","mochila"],
  ["La","abuela","teje","un","suéter"],
  ["El","conejo","salta","muy","alto"],
  ["Los","peces","viven","en","el","mar"],
  ["Mi","amigo","come","una","manzana"],
  ["La","luna","sale","en","la","noche"],
  ["El","bebé","llora","con","fuerza"],
  ["Los","árboles","crecen","en","el","bosque"]
];
 
// ════════════════════════════════════════
// RENDERER — alta calidad
// ════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
// Calidad alta: pixelRatio del dispositivo (hasta 2x para 1080p+)
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight, false);
renderer.setClearColor(0x87CEEB, 1);
renderer.autoClear = false;
renderer.shadowMap.enabled = false;
canvas.style.width  = innerWidth  + 'px';
canvas.style.height = innerHeight + 'px';
 
// ════════════════════════════════════════
// ESCENA
// ════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 16, 38);
scene.add(new THREE.AmbientLight(0xfff8f0, 1.1));
const dl = new THREE.DirectionalLight(0xfff0cc, 0.7);
dl.position.set(4, 9, 3); scene.add(dl);
const dl2 = new THREE.DirectionalLight(0xccddff, 0.3);
dl2.position.set(-3, 5, 5); scene.add(dl2);
 
const cam = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 60);
cam.position.set(0, 1.6, 0.8);
 
// Orientación inicial: mirando al pizarrón
let yaw = 0, pitch = -0.06;
 
// ════════════════════════════════════════
// SALÓN — geometría mejorada
// ════════════════════════════════════════
function addBox(w,h,d,col,x,y,z,ry=0) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshLambertMaterial({color:col})
  );
  m.position.set(x,y,z);
  if(ry) m.rotation.y = ry;
  scene.add(m); return m;
}
 
// Piso con textura procedural
(()=>{
  const cv=document.createElement('canvas'); cv.width=512; cv.height=512;
  const cx=cv.getContext('2d');
  for(let r=0;r<8;r++) for(let c2=0;c2<4;c2++){
    cx.fillStyle=(r+c2)%2===0?'#c8832a':'#b87020';
    cx.fillRect(c2*128, r*64, 128, 64);
  }
  cx.strokeStyle='#9a5a10'; cx.lineWidth=2;
  for(let i=0;i<=8;i++){cx.beginPath();cx.moveTo(0,i*64);cx.lineTo(512,i*64);cx.stroke();}
  for(let i=0;i<=4;i++){cx.beginPath();cx.moveTo(i*128,0);cx.lineTo(i*128,512);cx.stroke();}
  const t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(5,5);
  const m=new THREE.Mesh(new THREE.PlaneGeometry(16,14),
    new THREE.MeshLambertMaterial({map:t}));
  m.rotation.x=-Math.PI/2; scene.add(m);
})();
 
// Techo con textura
(()=>{
  const cv=document.createElement('canvas'); cv.width=256; cv.height=256;
  const cx=cv.getContext('2d');
  cx.fillStyle='#f5f0e5'; cx.fillRect(0,0,256,256);
  cx.strokeStyle='#e0dbd0'; cx.lineWidth=1;
  for(let i=0;i<8;i++){cx.beginPath();cx.moveTo(i*32,0);cx.lineTo(i*32,256);cx.stroke();}
  for(let i=0;i<8;i++){cx.beginPath();cx.moveTo(0,i*32);cx.lineTo(256,i*32);cx.stroke();}
  const t=new THREE.CanvasTexture(cv); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(4,4);
  const m=new THREE.Mesh(new THREE.PlaneGeometry(16,14),
    new THREE.MeshLambertMaterial({map:t}));
  m.rotation.x=Math.PI/2; m.position.y=4; scene.add(m);
})();
 
// Paredes
const wallMat = new THREE.MeshLambertMaterial({color:0xf2ede0});
[[16,4.1,.15,0,2,-5],[16,4.1,.15,0,2,5],[.15,4.1,14,-7,2,0],[.15,4.1,14,7,2,0]].forEach(([w,h,d,x,y,z])=>{
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),wallMat);
  m.position.set(x,y,z); scene.add(m);
});
 
// Ventanas izquierda con luz
const winMat=new THREE.MeshLambertMaterial({color:0xd4eeff,transparent:true,opacity:.55});
const frameMat=new THREE.MeshLambertMaterial({color:0x8B6914});
[-2.5,1.5].forEach(z=>{
  new THREE.Mesh(new THREE.BoxGeometry(.04,1.6,2.1),winMat).position.set(-6.93,2.6,z);
  scene.children[scene.children.length]; // ya añadido? No, usemos addBox
  addBox(.04,1.6,2.1,0xd4eeff,-6.93,2.6,z);
  addBox(.14,1.85,2.35,0x8B6914,-6.96,2.6,z);
  // Luz de ventana
  const wl=new THREE.PointLight(0xfff8cc,0.5,6);
  wl.position.set(-5.5,2.6,z); scene.add(wl);
});
 
// Pizarrón — superficie verde oscuro
addBox(7.2,3.2,.12,0x1a4a28,0,2.2,-4.9);
// Marco doble
addBox(7.6,.14,.15,0x6B3303,0,3.82,-4.9);
addBox(7.6,.14,.15,0x6B3303,0,.66,-4.9);
addBox(.14,3.2,.15,0x6B3303,-3.82,2.2,-4.9);
addBox(.14,3.2,.15,0x6B3303,3.82,2.2,-4.9);
// Repisa
addBox(7.6,.1,.3,0x6B3303,0,.66,-4.82);
// Borradores en repisa
addBox(.3,.08,.15,0xeeeeee,-2,0.72,-4.7);
addBox(.3,.08,.15,0xeeeeee,-1.5,0.72,-4.7);
// Soporte pizarrón
addBox(.12,1.2,.12,0x5a3010,-2.5,-0.35,-4.85);
addBox(.12,1.2,.12,0x5a3010,2.5,-0.35,-4.85);
addBox(5.2,.1,.12,0x5a3010,0,-0.9,-4.85);
 
// Escritorio maestro mejorado
addBox(2.4,.08,1.1,0x9a5a1e,0,.76,-3.5);
addBox(2.4,.04,.8,0xb87030,0,.80,-3.5); // superficie
addBox(.08,.76,1,0x7a4010,-1.15,.38,-3.5);
addBox(.08,.76,1,0x7a4010,1.15,.38,-3.5);
addBox(2.2,.04,.04,0x7a4010,0,.38,-3.95);
addBox(2.2,.04,.04,0x7a4010,0,.38,-3.05);
// Objeto encima del escritorio (libro)
addBox(.4,.06,.3,0x2244aa,.5,.83,-3.5);
 
// Mesas alumnos mejoradas
[[-2.6,1.6],[-2.6,3.0],[2.6,1.6],[2.6,3.0],[-2.6,4.2],[2.6,4.2]].forEach(([x,z])=>{
  addBox(1.5,.07,1,0xcc7730,x,.69,z);
  addBox(1.5,.03,.95,0xdd8840,x,.73,z);
  addBox(.07,.69,.9,0x996620,x-.68,.345,z);
  addBox(.07,.69,.9,0x996620,x+.68,.345,z);
  addBox(.07,.69,.04,0x996620,x-.68,.345,z-.45);
  addBox(.07,.69,.04,0x996620,x+.68,.345,z-.45);
  // Silla
  addBox(.75,.06,.72,0xddaa55,x,.44,z+.72);
  addBox(.75,.42,.06,0xddaa55,x,.64,z+1.05);
  [[-.32,.37,z+1.38],[.32,.37,z+1.38],[-.32,.37,z+.38],[.32,.37,z+.38]].forEach(([lx,ly,lz])=>{
    addBox(.06,.42,.06,0xbb8833,lx,ly,lz);
  });
  // Cuaderno encima
  addBox(.35,.02,.28,0xffffff,x+.3,.73,z-.1);
});
 
// Decoración: poster en pared derecha
addBox(.05,1.5,2,0xffffff,6.92,2.8,0);
addBox(.04,1.6,2.2,0x333333,6.95,2.8,0);
 
// Papelera
addBox(.35,.4,.35,0x444444,-5.5,.2,4.5);
 
// ════════════════════════════════════════
// TARJETAS
// ════════════════════════════════════════
const CW=1.15, CH=0.60;
const BZ=-4.82, WY=2.58, SY=1.40;
let cards=[], slots=[], answer=[], held=null, qIdx=0, locked=false;
 
function mkCard(w, bg, fg) {
  const cv=document.createElement('canvas'); cv.width=300; cv.height=150;
  const cx=cv.getContext('2d');
  // Sombra sutil
  cx.shadowColor='rgba(0,0,0,0.2)'; cx.shadowBlur=4;
  cx.fillStyle=bg; cx.fillRect(4,4,292,142);
  cx.shadowBlur=0;
  // Borde
  cx.strokeStyle='#888'; cx.lineWidth=3; cx.strokeRect(4,4,292,142);
  // Línea inferior decorativa
  cx.strokeStyle='#ccc'; cx.lineWidth=2;
  cx.beginPath(); cx.moveTo(20,118); cx.lineTo(280,118); cx.stroke();
  // Texto
  const fs=w.length>7?38:w.length>5?48:60;
  cx.font=`bold ${fs}px Arial`; cx.fillStyle=fg;
  cx.textAlign='center'; cx.textBaseline='middle';
  cx.fillText(w,150,68);
  return new THREE.CanvasTexture(cv);
}
function mkSlot(n) {
  const cv=document.createElement('canvas'); cv.width=300; cv.height=150;
  const cx=cv.getContext('2d');
  cx.fillStyle='rgba(255,255,255,0.07)'; cx.fillRect(0,0,300,150);
  cx.strokeStyle='rgba(255,255,255,0.7)'; cx.lineWidth=3; cx.setLineDash([10,6]);
  cx.strokeRect(5,5,290,140);
  cx.font='bold 56px Arial'; cx.fillStyle='rgba(255,255,255,0.6)';
  cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText(n,150,75);
  return new THREE.CanvasTexture(cv);
}
function mkTitle(n) {
  const cv=document.createElement('canvas'); cv.width=640; cv.height=72;
  const cx=cv.getContext('2d');
  cx.fillStyle='#163d1e'; cx.fillRect(0,0,640,72);
  cx.font='bold 30px Arial'; cx.fillStyle='#FFD700';
  cx.textAlign='center'; cx.textBaseline='middle';
  cx.fillText(`Oración ${n} de 20  —  Ordena las palabras`,320,36);
  return new THREE.CanvasTexture(cv);
}
 
let titleMesh=null;
function setTitle(n){
  if(titleMesh) scene.remove(titleMesh);
  titleMesh=new THREE.Mesh(new THREE.PlaneGeometry(6.4,.58),
    new THREE.MeshBasicMaterial({map:mkTitle(n),transparent:true,depthWrite:false}));
  titleMesh.position.set(0,3.55,BZ+.07); scene.add(titleMesh);
}
 
function loadQ(idx){
  locked=false; held=null; qIdx=idx;
  cards.forEach(c=>scene.remove(c));
  slots.forEach(s=>scene.remove(s));
  cards=[]; slots=[];
  const words=ORACIONES[idx];
  answer=new Array(words.length).fill(null);
  const n=words.length, gap=.1, totalW=n*(CW+gap);
  const x0=-totalW/2+CW/2;
  for(let i=0;i<n;i++){
    const m=new THREE.Mesh(new THREE.PlaneGeometry(CW,CH),
      new THREE.MeshBasicMaterial({map:mkSlot(i+1),transparent:true,
        side:THREE.DoubleSide,depthWrite:false}));
    m.position.set(x0+i*(CW+gap),SY,BZ+.05);
    m.userData={isSlot:true,si:i}; scene.add(m); slots.push(m);
  }
  const shuf=[...words].sort(()=>Math.random()-.5);
  shuf.forEach((w,i)=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(CW,CH,.022),
      new THREE.MeshLambertMaterial({map:mkCard(w,'#FFFDE7','#111')}));
    const ox=x0+i*(CW+gap);
    m.position.set(ox,WY,BZ+.05);
    m.userData={word:w,ox,oy:WY,oz:BZ+.05,onBoard:false,si:-1};
    scene.add(m); cards.push(m);
  });
  setTitle(idx+1);
  document.getElementById('progreso').textContent=`${idx+1} / 20`;
  setInstr('Mira una tarjeta 1.5 seg 👁️');
  gazeObj=null; gazeDt=0; setArc(0);
}
 
function reiniciar(){
  if(locked)return;
  held=null;
  cards.forEach(c=>{
    if(c.userData.onBoard){
      c.userData.onBoard=false; c.userData.si=-1;
      c.position.set(c.userData.ox,c.userData.oy,c.userData.oz);
      c.material.map=mkCard(c.userData.word,'#FFFDE7','#111');
      c.material.needsUpdate=true;
    }
    c.scale.set(1,1,1);
  });
  answer=new Array(ORACIONES[qIdx].length).fill(null);
  gazeObj=null; gazeDt=0; setArc(0);
  setInstr('Mira una tarjeta 1.5 seg 👁️');
}
 
function place(card,si){
  const prev=cards.find(c=>c.userData.onBoard&&c.userData.si===si);
  if(prev){
    prev.userData.onBoard=false; prev.userData.si=-1;
    prev.position.set(prev.userData.ox,prev.userData.oy,prev.userData.oz);
    prev.material.map=mkCard(prev.userData.word,'#FFFDE7','#111');
    prev.material.needsUpdate=true; answer[si]=null;
  }
  const sl=slots[si];
  card.position.set(sl.position.x,sl.position.y,sl.position.z+.01);
  card.userData.onBoard=true; card.userData.si=si;
  card.material.map=mkCard(card.userData.word,'#E8F5E9','#1b5e20');
  card.material.needsUpdate=true;
  answer[si]=card.userData.word; held=null;
  soundColocar();
}
 
function check(){
  if(answer.some(p=>p===null))return;
  locked=true;
  const cor=ORACIONES[qIdx];
  if(cor.every((w,i)=>w===answer[i])){
    soundCorrecto();
    showFB('¡Correcto! ⭐','ok');
    setTimeout(()=>{hideFB();qIdx<19?loadQ(qIdx+1):setInstr('🏆 ¡Completaste las 20 oraciones!');},2200);
  } else {
    soundIncorrecto();
    showFB('¡Inténtalo! 💪','mal');
    const cv=document.createElement('canvas');cv.width=800;cv.height=72;
    const cx=cv.getContext('2d');
    cx.fillStyle='rgba(0,60,15,.96)';cx.fillRect(0,0,800,72);
    cx.font='bold 30px Arial';cx.fillStyle='#FFD700';
    cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('✓ '+cor.join(' '),400,36);
    if(titleMesh){titleMesh.material.map=new THREE.CanvasTexture(cv);titleMesh.material.needsUpdate=true;}
    setTimeout(()=>{hideFB();reiniciar();locked=false;setTitle(qIdx+1);},3000);
  }
}
function showFB(t,cl){const e=document.getElementById('feedback');e.textContent=t;e.className=cl+' show';}
function hideFB(){document.getElementById('feedback').className='';}
function setInstr(t){document.getElementById('instruccion').textContent=t;}
 
// ════════════════════════════════════════
// GAZE
// ════════════════════════════════════════
const RC=new THREE.Raycaster();
const C2D=new THREE.Vector2(0,0);
const ARC_C=138.2;
let gazeObj=null, gazeDt=0;
const T_GAZE=1500;
function setArc(p,col){
  const a=document.getElementById('gazeArc');
  a.setAttribute('stroke-dashoffset',ARC_C*(1-p));
  if(col) a.setAttribute('stroke',col);
}
 
// ════════════════════════════════════════
// GIROSCOPIO — correctamente implementado
// Solo se activa en modo VR
// ════════════════════════════════════════
let vrMode=false, gyroOK=false;
const GQ=new THREE.Quaternion();
// Quaternion que convierte "frame del mundo" al frame de cámara 3D
const SCREEN_TO_CAM=new THREE.Quaternion(-Math.sqrt(.5),0,0,Math.sqrt(.5));
const tmpQ=new THREE.Quaternion(), tmpE=new THREE.Euler();
const ZEE=new THREE.Vector3(0,0,1), QSC=new THREE.Quaternion();
 
// Quaternion de referencia: diferencia entre primer frame giroscopio y orientación deseada
let qRef=null;
 
function computeGyroQuat(alpha, beta, gamma) {
  // Convertir ángulos a quaternion en frame del sensor
  tmpE.set(
    THREE.MathUtils.degToRad(beta  || 0),
    THREE.MathUtils.degToRad(alpha || 0),
    -THREE.MathUtils.degToRad(gamma || 0),
    'YXZ'
  );
  tmpQ.setFromEuler(tmpE);
  tmpQ.multiply(SCREEN_TO_CAM);
  // Compensar rotación de pantalla (landscape)
  const screenAngle=(screen.orientation||{}).angle || window.orientation || 0;
  QSC.setFromAxisAngle(ZEE, -THREE.MathUtils.degToRad(screenAngle));
  tmpQ.multiply(QSC);
  return tmpQ.clone();
}
 
// API 1: AbsoluteOrientationSensor (más preciso, Chrome Android)
let absSensor=null;
function initAbsSensor(){
  if(!('AbsoluteOrientationSensor' in window)) return false;
  try {
    absSensor=new AbsoluteOrientationSensor({frequency:60,referenceFrame:'screen'});
    absSensor.addEventListener('reading',()=>{
      if(!vrMode) return;
      const q=absSensor.quaternion;
      tmpQ.set(q[0],q[1],q[2],q[3]);
      applyGyroQuat(tmpQ);
    });
    absSensor.addEventListener('error',()=>{ absSensor=null; });
    return true;
  } catch(e){ return false; }
}
 
// API 2: deviceorientation (universal)
let lastAlpha=null;
window.addEventListener('deviceorientation',e=>{
  if(!vrMode||!e.alpha) return;
  // Si AbsoluteOrientationSensor ya funciona, no usar deviceorientation
  if(absSensor&&gyroOK) return;
  gyroOK=true;
  const q=computeGyroQuat(e.alpha, e.beta, e.gamma);
  applyGyroQuat(q);
},true);
 
function applyGyroQuat(rawQ) {
  gyroOK=true;
  // Primer frame: calcular referencia para que arranque mirando al frente
  if(qRef===null) {
    // qRef = inverso del rawQ inicial multiplicado por la orientación actual de la cámara
    qRef=rawQ.clone().invert().premultiply(cam.quaternion.clone());
  }
  // Aplicar referencia
  const result=qRef.clone().multiply(rawQ);
  // Suavizado estable: interpolación con factor bajo
  GQ.slerp(result, 0.1);
}
 
// Controles táctil / mouse (para modo normal SIN gafas)
let drag=false,lx=0,ly=0;
function moveCam(dx,dy){
  yaw-=dx*.004; pitch-=dy*.004;
  pitch=Math.max(-.8,Math.min(.3,pitch));
}
canvas.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{
  if(!drag||vrMode)return;
  moveCam(e.clientX-lx,e.clientY-ly);
  lx=e.clientX;ly=e.clientY;
});
canvas.addEventListener('touchstart',e=>{lx=e.touches[0].clientX;ly=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(vrMode)return;
  moveCam(e.touches[0].clientX-lx,e.touches[0].clientY-ly);
  lx=e.touches[0].clientX;ly=e.touches[0].clientY;
},{passive:false});
 
// ════════════════════════════════════════
// VR CARDBOARD
// ════════════════════════════════════════
const LCAM=new THREE.PerspectiveCamera(80,1,.1,60);
const RCAM=new THREE.PerspectiveCamera(80,1,.1,60);
const IPD=0.064;
 
function resize(){
  const W=innerWidth,H=innerHeight;
  renderer.setSize(W,H,false);
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  cam.aspect=W/H; cam.updateProjectionMatrix();
}
 
function toggleVR(){
  if(!vrMode){
    // Pedir permisos
    if(typeof DeviceOrientationEvent!=='undefined'&&
       typeof DeviceOrientationEvent.requestPermission==='function'){
      DeviceOrientationEvent.requestPermission().catch(()=>{});
    }
    // Iniciar sensor absoluto
    if(!absSensor) initAbsSensor();
    if(absSensor) absSensor.start().catch(()=>{});
 
    vrMode=true; qRef=null; gyroOK=false;
    // Copiar orientación actual de cámara a GQ para transición suave
    const EU2=new THREE.Euler(pitch,yaw,0,'YXZ');
    GQ.setFromEuler(EU2);
 
    document.getElementById('btnVR').textContent='✕ Salir VR';
    document.getElementById('topright').style.display='none';
    ['instruccion','feedback'].forEach(id=>{
      const e=document.getElementById(id);
      e.style.left='25%'; e.style.transform='translateX(-50%)';
    });
    document.getElementById('gaze').style.left='25%';
    document.getElementById('gaze').style.transform='translate(-50%,-50%)';
    // Fullscreen + landscape
    const el=document.documentElement;
    (el.requestFullscreen||el.webkitRequestFullscreen||function(){}
    ).call(el).catch(()=>{});
    if(screen.orientation&&screen.orientation.lock)
      screen.orientation.lock('landscape').catch(()=>{});
    setTimeout(resize,300); setTimeout(resize,800);
  } else {
    vrMode=false; gyroOK=false; qRef=null;
    if(absSensor) absSensor.stop().catch(()=>{});
    document.getElementById('btnVR').textContent='⬛ Modo Cardboard VR';
    document.getElementById('topright').style.display='flex';
    ['instruccion','feedback'].forEach(id=>{
      const e=document.getElementById(id);
      e.style.left='50%'; e.style.transform='translateX(-50%)';
    });
    document.getElementById('gaze').style.left='50%';
    document.getElementById('gaze').style.transform='translate(-50%,-50%)';
    (document.exitFullscreen||document.webkitExitFullscreen||function(){}
    ).call(document).catch(()=>{});
    if(screen.orientation&&screen.orientation.unlock) screen.orientation.unlock();
    setTimeout(resize,300);
  }
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,500));
document.addEventListener('fullscreenchange',()=>setTimeout(resize,400));
document.addEventListener('webkitfullscreenchange',()=>setTimeout(resize,400));
 
// ════════════════════════════════════════
// LOOP PRINCIPAL
// ════════════════════════════════════════
const EU3=new THREE.Euler(0,0,0,'YXZ'), QQ=new THREE.Quaternion();
let lastT=0, running=false;
 
function loop(now){
  requestAnimationFrame(loop);
  if(!running) return;
  const dt=Math.min(now-lastT,50); lastT=now;
 
  // Orientación cámara
  if(vrMode && gyroOK){
    cam.quaternion.copy(GQ);
  } else {
    EU3.set(pitch,yaw,0,'YXZ');
    QQ.setFromEuler(EU3);
    cam.quaternion.copy(QQ);
  }
 
  // Tarjeta en mano flota frente a la cámara
  if(held){
    const d=new THREE.Vector3(.22,-.18,-1.05);
    d.applyQuaternion(cam.quaternion);
    held.position.copy(cam.position).add(d);
    held.quaternion.copy(cam.quaternion);
  }
 
  // Gaze raycast
  if(!locked){
    RC.setFromCamera(C2D, cam);
    const tgts=[...cards.filter(c=>c!==held),...slots];
    const hits=RC.intersectObjects(tgts);
    const hit=hits.length?hits[0].object:null;
    if(hit!==gazeObj){gazeObj=hit;gazeDt=0;setArc(0,'#FFD700');}
    if(gazeObj){
      gazeDt+=dt;
      if(!held){
        if(!gazeObj.userData.onBoard&&!gazeObj.userData.isSlot){
          const p=Math.min(gazeDt/T_GAZE,1);
          setArc(p,'#FFD700');
          gazeObj.scale.set(1+p*.06,1+p*.06,1);
          if(gazeDt>=T_GAZE){
            held=gazeObj; gazeObj.scale.set(1.06,1.06,1);
            soundTomar();
            gazeObj=null;gazeDt=0;setArc(0);
            setInstr('¡Tomada! Apunta al número 🎯');
          }
        } else if(gazeObj.userData.onBoard){
          const p=Math.min(gazeDt/T_GAZE,1);
          setArc(p,'#FF6644');
          if(gazeDt>=T_GAZE){
            gazeObj.userData.onBoard=false;
            answer[gazeObj.userData.si]=null;
            gazeObj.userData.si=-1;
            gazeObj.material.map=mkCard(gazeObj.userData.word,'#FFFDE7','#111');
            gazeObj.material.needsUpdate=true;
            held=gazeObj; soundTomar();
            gazeObj=null;gazeDt=0;setArc(0);
            setInstr('¡Tomada! Apunta al número 🎯');
          }
        } else setArc(0);
      } else {
        if(gazeObj.userData.isSlot){
          const p=Math.min(gazeDt/T_GAZE,1);
          setArc(p,'#00FF88');
          slots[gazeObj.userData.si].scale.set(1+p*.08,1+p*.08,1);
          if(gazeDt>=T_GAZE){
            place(held,gazeObj.userData.si);
            slots.forEach(s=>s.scale.set(1,1,1));
            gazeObj=null;gazeDt=0;setArc(0);
            setInstr('Mira una tarjeta 1.5 seg 👁️');
            check();
          }
        } else setArc(0);
      }
    } else {
      setArc(0,'#FFD700');
      if(!held) cards.forEach(c=>c.scale.set(1,1,1));
      slots.forEach(s=>s.scale.set(1,1,1));
    }
  }
 
  // Render
  const RW=renderer.domElement.width, RH=renderer.domElement.height;
  renderer.clear();
  if(vrMode){
    const HW=Math.floor(RW/2), asp=HW/RH;
    LCAM.aspect=asp; LCAM.fov=80; LCAM.updateProjectionMatrix();
    LCAM.position.copy(cam.position); LCAM.quaternion.copy(cam.quaternion); LCAM.translateX(-IPD/2);
    RCAM.aspect=asp; RCAM.fov=80; RCAM.updateProjectionMatrix();
    RCAM.position.copy(cam.position); RCAM.quaternion.copy(cam.quaternion); RCAM.translateX(IPD/2);
    renderer.setScissorTest(true);
    renderer.setViewport(0,0,HW,RH); renderer.setScissor(0,0,HW,RH);
    renderer.clear(); renderer.render(scene,LCAM);
    renderer.setViewport(HW,0,HW,RH); renderer.setScissor(HW,0,HW,RH);
    renderer.clear(); renderer.render(scene,RCAM);
    renderer.setScissorTest(false);
  } else {
    renderer.setScissorTest(false);
    renderer.setViewport(0,0,RW,RH);
    renderer.render(scene,cam);
  }
}
 
function start(){
  running=true;
  unlockAudio();
  document.getElementById('inicio').classList.add('out');
  setTimeout(()=>document.getElementById('inicio').remove(),600);
  loadQ(0);
  startBgMusic();
}
requestAnimationFrame(loop);
</script>
